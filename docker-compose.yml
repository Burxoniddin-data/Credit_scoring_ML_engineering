version: "3.9"

# Reusable Airflow config
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infrastructure/airflow/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

    # Your app DB connection (used in tasks)
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_PORT: ${POSTGRES_PORT}

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/tasks:/opt/airflow/tasks
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./:/opt/airflow/app   # gives Airflow access to your project code

  depends_on:
    - postgres

services:

  # =========================
  # 🐘 PostgreSQL
  # =========================
  postgres:
    image: postgres:15
    container_name: credit_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # =========================
  # 🌬️ Airflow Init (run once)
  # =========================
  airflow-init:
    <<: *airflow-common
    container_name: webserver
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname admin
        --lastname admin
        --role Admin
        --email admin@example.com
      "
    depends_on:
      - postgres

  # =========================
  # 🌬️ Airflow Webserver
  # =========================
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  # =========================
  # 🌬️ Airflow Scheduler
  # =========================
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init

  # =========================
  # 📊 MLflow Server
  # =========================
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_server
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow_utils
    ports:
      - "5001:5000"

  # =========================
  # 🤖 Data Generator
  # =========================
  generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data_generator
    command: python scripts/run_generator.py
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
    depends_on:
      - postgres

volumes:
  postgres_data:
  mlflow_data: